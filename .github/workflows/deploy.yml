name: Deploy to Production

on:
  push:
    branches:
      - master

env:
  REGISTRY: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com
  IMAGE_NAME: wangshun_build/wangshun_build

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: 配置 JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: 全量构建后端 - 生成 Fat JAR
      - name: Build backend with Maven
        run: mvn clean package -DskipTests

      # Step 4: 安装 Node.js 并构建前端
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build frontend
        run: |
          cd lumina-dashboard
          npm install -g pnpm
          pnpm install
          pnpm build

      # Step 5: 登录阿里云仓库
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: aliyun4384550071
          password: wangshun817

      # Step 6: 生成版本标签
      - name: Generate version tag
        id: version
        run: echo "VERSION=${{ github.sha }}" >> $GITHUB_OUTPUT

      # Step 7: 搬运 Jar 包到根目录 (Dockerfile 需要从根目录 COPY)
      - name: Copy JAR files to root
        run: |
          cp lumina-control-plane/target/lumina-control-plane-exec.jar .
          cp lumina-sample-engine-service/target/lumina-sample-engine-service-exec.jar .
          cp lumina-sample-radar-service/target/lumina-sample-radar-service-exec.jar .
          cp lumina-sample-command/target/lumina-sample-command-exec.jar .

      # Step 7.1: 搬运前端 dist 和 nginx.conf 到根目录
      - name: Copy frontend files to root
        run: |
          cp -r lumina-dashboard/dist .
          cp lumina-dashboard/nginx.conf .

      # Step 8: 构建并推送后端服务镜像（带版本标签）
      # 8.1 Control Plane
      - name: Build and push control-plane
        run: |
          docker build -f Dockerfile.control-plane -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:control-plane -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:control-plane-${{ steps.version.outputs.VERSION }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:control-plane
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:control-plane-${{ steps.version.outputs.VERSION }}

      # 8.2 Sample Engine
      - name: Build and push engine
        run: |
          docker build -f Dockerfile.sample-engine -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:engine -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:engine-${{ steps.version.outputs.VERSION }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:engine
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:engine-${{ steps.version.outputs.VERSION }}

      # 8.3 Sample Radar
      - name: Build and push radar
        run: |
          docker build -f Dockerfile.sample-radar -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:radar -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:radar-${{ steps.version.outputs.VERSION }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:radar
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:radar-${{ steps.version.outputs.VERSION }}

      # 8.4 Sample Command
      - name: Build and push command
        run: |
          docker build -f Dockerfile.sample-command -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:command -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:command-${{ steps.version.outputs.VERSION }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:command
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:command-${{ steps.version.outputs.VERSION }}

      # Step 9: 构建并推送前端 Dashboard 镜像
      - name: Build and push dashboard
        run: |
          docker build -f Dockerfile.front -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dashboard -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dashboard-${{ steps.version.outputs.VERSION }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dashboard
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dashboard-${{ steps.version.outputs.VERSION }}

      # Step 10: 设置 SSH 密钥 (从仓库文件复制)
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          cp deploy_key.pem ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 120.26.186.0 >> ~/.ssh/known_hosts 2>/dev/null || true

      # Step 11: 推送 docker-compose.yml 到服务器
      - name: Deploy docker-compose.yml via SCP
        run: |
          scp docker-compose.yml root@120.26.186.0:/root/lumina-rpc-prod/

      # Step 12: 远程部署 - 带健康检查和回滚机制
      - name: Deploy with SSH
        run: |
          ssh root@120.26.186.0 'bash -s' << 'ENDSSH'
          cd /root/lumina-rpc-prod
          VERSION="${{ steps.version.outputs.VERSION }}"

          echo "=== Step 1: 登录 ACR ==="
          echo "wangshun817" | sudo docker login crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com -u aliyun4384550071 --password-stdin

          echo "=== Step 2: 备份当前运行状态 ==="
          BACKUP_FILE="backup_$(date +%Y%m%d_%H%M%S).txt"
          sudo docker ps --format "{{.Names}} {{.Status}}" > "$BACKUP_FILE"
          echo "Backup saved to $BACKUP_FILE"

          echo "=== Step 3: 停止 lumina 相关容器 ==="
          sudo docker compose down

          echo "=== Step 4: 拉取新版本镜像 ==="
          sudo docker compose pull

          echo "=== Step 5: 顺序启动服务 ==="
          sudo docker compose up -d mysql
          sleep 20

          for i in {1..30}; do
            if sudo docker exec lumina-mysql mysql -ulumina -plumina123 -e "SELECT 1" 2>/dev/null; then
              echo "MySQL is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "MySQL failed to start"
              exit 1
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 5
          done

          echo "Starting Control Plane..."
          sudo docker compose up -d control-plane
          sleep 15

          for i in {1..20}; do
            if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
              echo "Control Plane is healthy!"
              break
            fi
            if [ $i -eq 20 ]; then
              echo "Control Plane health check failed"
              sudo docker compose logs control-plane --tail 50
              exit 1
            fi
            echo "Waiting for Control Plane... ($i/20)"
            sleep 5
          done

          echo "Starting Engine, Radar, Command, Dashboard..."
          sudo docker compose up -d

          sleep 10

          echo "=== Step 6: 验证服务状态 ==="
          sudo docker ps | grep lumina

          echo "=== Step 7: 清理旧镜像 ==="
          sudo docker image prune -f

          echo "=== 部署成功！版本: $VERSION ==="
          ENDSSH
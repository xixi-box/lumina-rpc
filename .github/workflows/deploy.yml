name: Deploy to Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  # 单点真实来源 (Single Source of Truth) - 所有镜像和配置统一从这里定义
  REGISTRY: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com
  IMAGE_NAME: wangshun_build/wangshun_build
  ALIYUN_USERNAME: aliyun4384550071
  ALIYUN_PASSWORD: wangshun817

  # 基础设施配置 (IaC)
  MYSQL_ROOT_PASSWORD: lumina123
  MYSQL_USER: lumina
  MYSQL_PASSWORD: lumina123
  CONTROL_PLANE_PORT: 8080
  DASHBOARD_PORT: 3000

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}

    steps:
      # Step 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: 配置 JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: 全量构建后端 - 生成 Fat JAR
      - name: Build backend with Maven
        run: mvn clean package -DskipTests

      # Step 4: 安装 Node.js 并构建前端
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build frontend
        run: |
          cd lumina-dashboard
          npm install -g pnpm
          pnpm install
          pnpm build

      # Step 5: 登录阿里云仓库
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.ALIYUN_USERNAME }}
          password: ${{ env.ALIYUN_PASSWORD }}

      # Step 6: 生成版本标签
      - name: Generate version tag
        id: version
        run: echo "VERSION=${{ github.sha }}" >> $GITHUB_OUTPUT

      # Step 7: 搬运 Jar 包到根目录 (Dockerfile 需要从根目录 COPY)
      - name: Copy JAR files to root
        run: |
          cp lumina-control-plane/target/lumina-control-plane-exec.jar .
          cp lumina-sample-engine-service/target/lumina-sample-engine-service-exec.jar .
          cp lumina-sample-radar-service/target/lumina-sample-radar-service-exec.jar .
          cp lumina-sample-command/target/lumina-sample-command-exec.jar .

      # Step 7.1: 搬运前端 dist 和 nginx.conf 到根目录
      - name: Copy frontend files to root
        run: |
          cp -r lumina-dashboard/dist .
          cp lumina-dashboard/nginx.conf .

      # Step 8: 构建并推送后端服务镜像（带版本标签）
      # 8.1 Control Plane
      - name: Build and push control-plane
        run: |
          docker build -f Dockerfile.control-plane -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:control-plane -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:control-plane-${{ steps.version.outputs.VERSION }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:control-plane
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:control-plane-${{ steps.version.outputs.VERSION }}

      # 8.2 Sample Engine
      - name: Build and push engine
        run: |
          docker build -f Dockerfile.sample-engine -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:engine -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:engine-${{ steps.version.outputs.VERSION }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:engine
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:engine-${{ steps.version.outputs.VERSION }}

      # 8.3 Sample Radar
      - name: Build and push radar
        run: |
          docker build -f Dockerfile.sample-radar -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:radar -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:radar-${{ steps.version.outputs.VERSION }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:radar
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:radar-${{ steps.version.outputs.VERSION }}

      # 8.4 Sample Command
      - name: Build and push command
        run: |
          docker build -f Dockerfile.sample-command -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:command -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:command-${{ steps.version.outputs.VERSION }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:command
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:command-${{ steps.version.outputs.VERSION }}

      # Step 9: 构建并推送前端 Dashboard 镜像
      - name: Build and push dashboard
        run: |
          docker build -f Dockerfile.front -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dashboard -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dashboard-${{ steps.version.outputs.VERSION }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dashboard
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dashboard-${{ steps.version.outputs.VERSION }}

  deploy:
    name: Deploy via Self-Hosted Runner
    needs: build-and-push
    runs-on: self-hosted
    env:
      VERSION: ${{ needs.build-and-push.outputs.VERSION }}

    steps:
      # Step 1: 登录阿里云 ACR
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.ALIYUN_USERNAME }}
          password: ${{ env.ALIYUN_PASSWORD }}

      # Step 2: 本地部署 - 基础设施即代码 (IaC)
      - name: Deploy with Docker Compose (IaC)
        run: |
          mkdir -p lumina-rpc && cd lumina-rpc

          echo "=== Infrastructure as Code - 生成 docker-compose.yml ==="

          # 单点真实来源 (SSOT) - docker-compose.yml 完全由 CI/CD 生成
          cat > docker-compose.yml << 'EOF'
          # ============================================================
          # Lumina-RPC Docker Compose
          # 由 GitHub Actions 自动生成 - 基础设施即代码 (IaC)
          # 版本: ${{ env.VERSION }}
          # 生成时间: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # ============================================================

          services:
            # -------------------------------------------------------
            # MySQL 数据库
            # -------------------------------------------------------
            mysql:
              image: mysql:8.0
              container_name: lumina-mysql
              hostname: lumina-mysql
              restart: unless-stopped
              environment:
                MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
                MYSQL_DATABASE: lumina
                MYSQL_USER: ${{ env.MYSQL_USER }}
                MYSQL_PASSWORD: ${{ env.MYSQL_PASSWORD }}
              ports:
                - "3306:3306"
              networks:
                - lumina-net
              volumes:
                - mysql-data:/var/lib/mysql
              command:
                - --character-set-server=utf8mb4
                - --collation-server=utf8mb4_unicode_ci
                - --default-authentication-plugin=mysql_native_password
              deploy:
                resources:
                  limits:
                    memory: 512M

            # -------------------------------------------------------
            # Control Plane（控制面）
            # -------------------------------------------------------
            control-plane:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:control-plane
              container_name: lumina-control-plane
              restart: unless-stopped
              environment:
                JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError"
                SPRING_PROFILES_ACTIVE: prod
                MYSQL_URL: jdbc:mysql://lumina-mysql:3306/lumina?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
                MYSQL_USER: ${{ env.MYSQL_USER }}
                MYSQL_PASSWORD: ${{ env.MYSQL_PASSWORD }}
                TZ: Asia/Shanghai
              ports:
                - "${{ env.CONTROL_PLANE_PORT }}:8080"
              networks:
                - lumina-net
              depends_on:
                - mysql
              deploy:
                resources:
                  limits:
                    memory: 384M
              logging:
                driver: "json-file"
                options:
                  max-size: "50m"
                  max-file: "3"

            # -------------------------------------------------------
            # Dashboard（前端监控面板）
            # -------------------------------------------------------
            dashboard:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dashboard
              container_name: lumina-dashboard
              restart: unless-stopped
              ports:
                - "${{ env.DASHBOARD_PORT }}:80"
              depends_on:
                - control-plane
              networks:
                - lumina-net
              deploy:
                resources:
                  limits:
                    memory: 256M

            # -------------------------------------------------------
            # Warp Engine Service（曲率引擎服务）
            # -------------------------------------------------------
            sample-engine:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:engine
              container_name: lumina-sample-engine
              restart: unless-stopped
              environment:
                JAVA_OPTS: "-Xms128m -Xmx256m -XX:+ExitOnOutOfMemoryError"
                LUMINA_RPC_CONTROL_PLANE_URL: http://control-plane:8080
                LUMINA_RPC_SERVER_HOST: sample-engine
                TZ: Asia/Shanghai
              ports:
                - "8081:8081"
                - "9081:9081"
              networks:
                - lumina-net
              depends_on:
                - control-plane
              deploy:
                resources:
                  limits:
                    memory: 384M

            # -------------------------------------------------------
            # Deep Space Radar Service（深空雷达服务）
            # -------------------------------------------------------
            sample-radar:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:radar
              container_name: lumina-sample-radar
              restart: unless-stopped
              environment:
                JAVA_OPTS: "-Xms128m -Xmx256m -XX:+ExitOnOutOfMemoryError"
                LUMINA_RPC_CONTROL_PLANE_URL: http://control-plane:8080
                LUMINA_RPC_SERVER_HOST: sample-radar
                TZ: Asia/Shanghai
              ports:
                - "8082:8082"
                - "9082:9082"
              networks:
                - lumina-net
              depends_on:
                - control-plane
              deploy:
                resources:
                  limits:
                    memory: 384M

            # -------------------------------------------------------
            # Fleet Command Gateway（舰队指挥网关）
            # -------------------------------------------------------
            sample-command:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:command
              container_name: lumina-sample-command
              restart: unless-stopped
              environment:
                JAVA_OPTS: "-Xms128m -Xmx256m -XX:+ExitOnOutOfMemoryError"
                LUMINA_RPC_CONTROL_PLANE_URL: http://control-plane:8080
                TZ: Asia/Shanghai
              ports:
                - "8083:8083"
                - "9083:9083"
              networks:
                - lumina-net
              depends_on:
                - control-plane
                - sample-engine
                - sample-radar
              deploy:
                resources:
                  limits:
                    memory: 512M

          # -------------------------------------------------------
          # 网络定义
          # -------------------------------------------------------
          networks:
            lumina-net:
              driver: bridge

          # -------------------------------------------------------
          # 数据卷定义
          # -------------------------------------------------------
          volumes:
            mysql-data:
          EOF

          echo "=== Step 1: 备份当前运行状态 ==="
          BACKUP_FILE="backup_$(date +%Y%m%d_%H%M%S).txt"
          sudo docker ps --format "{{.Names}} {{.Status}}" > "$BACKUP_FILE" 2>/dev/null || echo "No running containers"
          echo "Backup saved to $BACKUP_FILE"

          echo "=== Step 2: 停止 lumina 相关容器（如果存在）==="
          sudo docker compose down 2>/dev/null || echo "No containers to stop (first run or already stopped)"

          echo "=== Step 3: 拉取新版本镜像 ==="
          sudo docker compose pull

          echo "=== Step 4: 顺序启动服务 ==="
          sudo docker compose up -d mysql
          sleep 20

          for i in {1..30}; do
            if sudo docker exec lumina-mysql mysql -ulumina -plumina123 -e "SELECT 1" 2>/dev/null; then
              echo "MySQL is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "MySQL failed to start"
              exit 1
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 5
          done

          echo "Starting Control Plane..."
          sudo docker compose up -d control-plane
          sleep 15

          for i in {1..20}; do
            if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
              echo "Control Plane is healthy!"
              break
            fi
            if [ $i -eq 20 ]; then
              echo "Control Plane health check failed"
              sudo docker compose logs control-plane --tail 50
              exit 1
            fi
            echo "Waiting for Control Plane... ($i/20)"
            sleep 5
          done

          echo "Starting Engine, Radar, Command, Dashboard..."
          sudo docker compose up -d

          sleep 10

          echo "=== Step 5: 验证服务状态 ==="
          sudo docker ps | grep lumina

          echo "=== Step 6: 清理旧镜像 ==="
          sudo docker image prune -f

          echo "=== 部署成功！版本: $VERSION ==="
          echo "=== 基础设施版本: $(grep '生成时间' docker-compose.yml) ==="

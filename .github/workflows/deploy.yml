name: Deploy to Production

on:
  push:
    branches:
      - master  # 确认你的主分支叫 master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build backend with Maven
        run: mvn clean package -DskipTests

      - name: Deploy to Server via SCP
        uses: appleboy/scp-action@master
        with:
          host: "42.193.105.133"
          username: "ubuntu"
          port: 22
          # 关键点 1：必须有这个竖线 |
          key: |
            -----BEGIN OPENSSH PRIVATE KEY-----
            b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
            QyNTUxOQAAACAhXf7A7RqKHRi03UJfZgaRM+n9FvsobsLQWTU+gqMtrQAAAJi59U1mufVN
            ZgAAAAtzc2gtZWQyNTUxOQAAACAhXf7A7RqKHRi03UJfZgaRM+n9FvsobsLQWTU+gqMtrQ
            AAAEAXBYMkCWPdQj8wuwo2sFDpNQkahl9K2g5kJwMOtPhGnSFd/sDtGoodGLTdQl9mBpEz
            6f0W+yhuwtBZNT6Coy2tAAAAETI2MDYyMDkzMDdAcXEuY29tAQIDBA==
            -----END OPENSSH PRIVATE KEY-----
          source: "target/*.jar,docker-compose.yml"
          target: "/home/ubuntu/lumina-app"
          strip_components: 0
          command_timeout: 10m

      - name: Deploy with SSH
        uses: appleboy/ssh-action@master
        with:
          host: "42.193.105.133"
          username: "ubuntu"
          port: 22
          # 关键点 2：两边都得硬编码，保持测试的一致性
          key: |
            -----BEGIN OPENSSH PRIVATE KEY-----
            b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
            QyNTUxOQAAACAhXf7A7RqKHRi03UJfZgaRM+n9FvsobsLQWTU+gqMtrQAAAJi59U1mufVN
            ZgAAAAtzc2gtZWQyNTUxOQAAACAhXf7A7RqKHRi03UJfZgaRM+n9FvsobsLQWTU+gqMtrQ
            AAAEAXBYMkCWPdQj8wuwo2sFDpNQkahl9K2g5kJwMOtPhGnSFd/sDtGoodGLTdQl9mBpEz
            6f0W+yhuwtBZNT6Coy2tAAAAETI2MDYyMDkzMDdAcXEuY29tAQIDBA==
            -----END OPENSSH PRIVATE KEY-----
          script: |
            echo "Deploying to /home/ubuntu/lumina-app..."
            sudo mkdir -p /home/ubuntu/lumina-app
            sudo chown -R ubuntu:ubuntu /home/ubuntu/lumina-app
            cd /home/ubuntu/lumina-app

            echo "Stopping old containers..."
            sudo docker-compose down

            echo "Building and starting new containers..."
            sudo docker-compose up -d --build

            echo "Deployment completed!"
name: Deploy to Production

on:
  push:
    branches:
      - main  # 注意：如果你的主分支叫 master，请改成 master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: 配置 JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: 全量构建 - 生成后端 Fat JAR
      - name: Build backend with Maven
        run: mvn clean package -DskipTests

      # ⚠️ 关键修改：直接在 with 中硬编码 IP 和 用户名，私钥从 secrets 读取
      # Step 4: SCP 复制文件到服务器
      - name: Deploy to Server via SCP
        uses: appleboy/scp-action@master
        with:
          host: "42.193.105.133"
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "target/*.jar,docker-compose.yml" # 推荐只传必要文件，如果你想全传就写 "."
          target: "/home/ubuntu/lumina-app"
          strip_components: 0
          command_timeout: 10m

      # Step 5: 远程执行 Docker Compose
      - name: Deploy with SSH
        uses: appleboy/ssh-action@master
        with:
          host: "42.193.105.133"
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "Deploying to /home/ubuntu/lumina-app..."
            sudo mkdir -p /home/ubuntu/lumina-app
            sudo chown -R ubuntu:ubuntu /home/ubuntu/lumina-app
            cd /home/ubuntu/lumina-app

            # 优雅停止旧容器
            echo "Stopping old containers..."
            sudo docker-compose down

            # 构建并启动新容器
            echo "Building and starting new containers..."
            sudo docker-compose up -d --build

            echo "Deployment completed!"
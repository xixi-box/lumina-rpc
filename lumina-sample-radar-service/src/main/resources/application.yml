server:
  port: 8082

spring:
  application:
    name: deep-space-radar

# Actuator 配置（健康检查）
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Lumina RPC 配置
lumina:
  rpc:
    # 注册中心地址
    registry:
      address: ${LUMINA_RPC_CONTROL_PLANE_URL:http://localhost:8080}
    # 服务端配置
    server:
      host: ${LUMINA_RPC_SERVER_HOST:127.0.0.1}
      port: 9082
    # 服务配置
    service:
      # 扫描的包路径
      scan-packages: com.lumina.sample.radar.service

# 日志配置
logging:
  level:
    com.lumina.sample.radar: INFO
    com.lumina.rpc: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

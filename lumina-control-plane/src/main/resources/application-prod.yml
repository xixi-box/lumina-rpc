server:
  port: 8080

spring:
  application:
    name: lumina-control-plane

  # 数据库配置：生产环境通过环境变量注入
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      validation-timeout: 5000
      max-lifetime: 600000
      maximum-pool-size: 20
      minimum-idle: 5

  # JPA 配置（生产环境）
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false       # 生产环境关闭SQL日志
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: Asia/Shanghai
        connection:
          release_mode: after_transaction
    open-in-view: false

# 日志配置（生产环境）
logging:
  level:
    com.lumina.controlplane: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

# 自定义配置
lumina:
  control-plane:
    sse:
      timeout: 1800000  # 30分钟 (毫秒)
      heartbeat-interval: 30  # 30秒心跳
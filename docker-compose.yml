version: '3.8'

# ============================================================
# Lumina-RPC Docker Compose
# 完整服务编排（5 个微服务 + MySQL）
# ============================================================

services:
  # -------------------------------------------------------
  # MySQL 数据库
  # -------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: lumina-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: lumina123
      MYSQL_DATABASE: lumina
      MYSQL_USER: lumina
      MYSQL_PASSWORD: lumina123
    ports:
      - "3306:3306"
    networks:
      - lumina-net
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    deploy:
      resources:
        limits:
          memory: 512M

  # -------------------------------------------------------
  # Control Plane（控制面）
  # -------------------------------------------------------
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    container_name: lumina-control-plane
    restart: unless-stopped
    environment:
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC"
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    networks:
      - lumina-net
    depends_on:
      - mysql
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - ./lumina-control-plane/src/main/resources/application.yml:/app/config/application.yml:ro

  # -------------------------------------------------------
  # Dashboard（前端监控面板）
  # -------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.front
    container_name: lumina-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - control-plane
    networks:
      - lumina-net
    deploy:
      resources:
        limits:
          memory: 256M

  # -------------------------------------------------------
  # Warp Engine Service（曲率引擎服务）
  # -------------------------------------------------------
  sample-engine:
    build:
      context: .
      dockerfile: Dockerfile.sample-engine
    container_name: lumina-sample-engine
    restart: unless-stopped
    environment:
      JAVA_OPTS: "-Xms128m -Xmx256m"
      LUMINA_RPC_CONTROL_PLANE_URL: http://control-plane:8080
      LUMINA_RPC_SERVER_HOST: sample-engine
    ports:
      - "8081:8081"
      - "9081:9081"
    networks:
      - lumina-net
    depends_on:
      - control-plane
    deploy:
      resources:
        limits:
          memory: 384M

  # -------------------------------------------------------
  # Deep Space Radar Service（深空雷达服务）
  # -------------------------------------------------------
  sample-radar:
    build:
      context: .
      dockerfile: Dockerfile.sample-radar
    container_name: lumina-sample-radar
    restart: unless-stopped
    environment:
      JAVA_OPTS: "-Xms128m -Xmx256m"
      LUMINA_RPC_CONTROL_PLANE_URL: http://control-plane:8080
      LUMINA_RPC_SERVER_HOST: sample-radar
    ports:
      - "8082:8082"
      - "9082:9082"
    networks:
      - lumina-net
    depends_on:
      - control-plane
    deploy:
      resources:
        limits:
          memory: 384M

  # -------------------------------------------------------
  # Fleet Command Gateway（舰队指挥网关）
  # -------------------------------------------------------
  sample-command:
    build:
      context: .
      dockerfile: Dockerfile.sample-command
    container_name: lumina-sample-command
    restart: unless-stopped
    environment:
      JAVA_OPTS: "-Xms128m -Xmx256m"
      LUMINA_RPC_CONTROL_PLANE_URL: http://control-plane:8080
    ports:
      - "8083:8083"
      - "9083:9083"
    networks:
      - lumina-net
    depends_on:
      - control-plane
      - sample-engine
      - sample-radar
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - ./lumina-sample-command/src/main/resources/application.yml:/app/config/application.yml:ro

# -------------------------------------------------------
# 网络定义
# -------------------------------------------------------
networks:
  lumina-net:
    driver: bridge

# -------------------------------------------------------
# 数据卷定义
# -------------------------------------------------------
volumes:
  mysql-data:
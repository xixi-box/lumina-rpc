# ============================================================
# Lumina-RPC Local Development Infrastructure
# 线上完整服务编排已放在部署流程中；本文件只保留本地开发依赖。
# ============================================================

services:
  mysql:
    image: mysql:8.0
    container_name: lumina-mysql
    hostname: lumina-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-lumina123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lumina}
      MYSQL_USER: ${MYSQL_USER:-lumina}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-lumina123}
      # 兼容应用侧/PaaS 命名；MySQL 镜像真正用于初始化账号的是上面的 MYSQL_*。
      DB_USER: ${DB_USER:-lumina}
      DB_PASS: ${DB_PASS:-lumina123}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql-data:
